apiVersion: apps/v1
kind: Deployment
metadata:
  name: indiogroup_internal_site
spec:
  selector:
    matchLabels:
      app: indiogroup_internal_site
  replicas: 1 
  template: 
    metadata:
      labels:
        app: indiogroup_internal_site
    spec:
      containers:
      - name: indiogroup_internal_site
        image: nathang5991/indiogroup_internal_site:latest  # <--- CORRIGE CETTE LIGNE
        ports:
        - containerPort: 8080
        imagePullPolicy: Always
---
apiVersion: v1
kind: Service
metadata:
  name: indiogroup_internal_site
  annotations:
    # Cette ligne force AWS à créer un Load Balancer public
    service.beta.kubernetes.io/aws-load-balancer-scheme: internet-facing
spec:
  type: LoadBalancer
  selector:
    app: indiogroup_internal_site
  ports:
  - name: http
    protocol: TCP
    port: 80
    targetPort: 8080
